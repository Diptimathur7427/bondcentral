<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Bond Central</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand"><a href="index.html" style="color:inherit;text-decoration:none;display:flex;align-items:center;gap:0.5rem;"><span class="logo-icon">⬡</span> Bond<strong>Central</strong></a></div>
</nav>

<div class="form-page" style="align-items:flex-start;padding-top:4rem;">
  <div class="form-card" style="max-width:580px;">
    <h2>Create Account</h2>
    <p class="form-sub">Join India's largest bond marketplace</p>

    <div class="role-selector">
      <button class="role-btn active" onclick="setRole(this,'investor')" id="role-investor">👤 Investor</button>
      <button class="role-btn" onclick="setRole(this,'company')" id="role-company">🏢 Company</button>
    </div>

    <!-- Investor Form -->
    <form id="investor-form" onsubmit="handleRegister(event,'investor')">
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" placeholder="Dipti" required/>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" placeholder="Mathur" required/>
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Mobile Number</label>
        <input type="tel" placeholder="+91 9876543210" required/>
      </div>
      <div class="form-group">
        <label>PAN Number</label>
        <input type="text" placeholder="ABCDE1234F" maxlength="10" style="text-transform:uppercase" required/>
      </div>
      <div class="form-group">
        <label>Investor Type</label>
        <select required>
          <option value="">Select Type</option>
          <option>Retail Individual Investor</option>
          <option>High Net Worth Individual (HNI)</option>
          <option>Non-Resident Indian (NRI)</option>
          <option>Institutional Investor</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Min. 8 characters" required/>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" placeholder="Repeat password" required/>
        </div>
      </div>
      <div class="form-group" style="display:flex;align-items:flex-start;gap:0.5rem;">
        <input type="checkbox" id="terms" style="margin-top:3px;accent-color:var(--gold);width:auto;" required/>
        <label for="terms" style="font-size:0.82rem;color:var(--text-muted);">I agree to the <a href="#" style="color:var(--gold)">Terms of Service</a> and acknowledge the investment risk disclaimer</label>
      </div>
      <button type="submit" class="btn-primary form-submit">Create Investor Account</button>
    </form>

    <!-- Company Form -->
    <form id="company-form" style="display:none;" onsubmit="handleRegister(event,'company')">
      <div class="form-group">
        <label>Company / Issuer Name</label>
        <input type="text" placeholder="ABC Corporation Ltd." required/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>CIN Number</label>
          <input type="text" placeholder="U12345MH2020PTC..." required/>
        </div>
        <div class="form-group">
          <label>Company PAN</label>
          <input type="text" placeholder="ABCDE1234F" required/>
        </div>
      </div>
      <div class="form-group">
        <label>Industry / Sector</label>
        <select required>
          <option value="">Select Sector</option>
          <option>Banking & Financial Services</option>
          <option>Infrastructure</option>
          <option>Energy & Power</option>
          <option>Real Estate</option>
          <option>Manufacturing</option>
          <option>Technology</option>
          <option>Healthcare</option>
          <option>Government / PSU</option>
        </select>
      </div>
      <div class="form-group">
        <label>Contact Person Email</label>
        <input type="email" placeholder="finance@company.com" required/>
      </div>
      <div class="form-group">
        <label>Mobile</label>
        <input type="tel" placeholder="+91 9876543210" required/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" required/>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" required/>
        </div>
      </div>
      <button type="submit" class="btn-primary form-submit">Register as Issuer</button>
    </form>

    <div id="reg-msg" style="margin-top:1rem;text-align:center;font-size:0.85rem;"></div>
    <div class="form-link">Already have an account? <a href="login.html">Login</a></div>
  </div>
</div>

<script src="main.js"></script>
<script>
let currentRole = 'investor';
function setRole(btn, role) {
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentRole = role;
  document.getElementById('investor-form').style.display = role === 'investor' ? 'block' : 'none';
  document.getElementById('company-form').style.display = role === 'company' ? 'block' : 'none';
}
function handleRegister(e, role) {
  e.preventDefault();
  const msg = document.getElementById('reg-msg');
  msg.style.color = 'var(--gold)';
  msg.textContent = 'Creating your account...';
  setTimeout(() => {
    msg.style.color = 'var(--green)';
    msg.textContent = '✅ Account created! Redirecting to login...';
    setTimeout(() => { window.location = 'login.html'; }, 1500);
  }, 1500);
}
</script>
</body>
</html>
